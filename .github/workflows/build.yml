name: Build Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Android32
          - target: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode CLI & SDK
        uses: geode-sdk/cli-setup@v2
        with:
          # This installs the Geode SDK files so CMake can find "geodeConfig.cmake"
          sdk: true

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          
