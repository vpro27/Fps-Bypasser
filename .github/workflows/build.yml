name: Build Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Android32
            abi: armeabi-v7a
          - target: Android64
            abi: arm64-v8a

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI and SDK
        run: |
          mkdir -p $HOME/.geode
          mkdir -p $GITHUB_WORKSPACE/geode-bin
          
          # Download and setup CLI
          wget https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-linux.zip -O geode-cli.zip
          unzip geode-cli.zip -d $GITHUB_WORKSPACE/geode-bin
          chmod +x $GITHUB_WORKSPACE/geode-bin/geode
          echo "$GITHUB_WORKSPACE/geode-bin" >> $GITHUB_PATH
          
          # Setup Profile and Core SDK
          $GITHUB_WORKSPACE/geode-bin/geode profile add --name default $HOME/.geode
          $GITHUB_WORKSPACE/geode-bin/geode sdk install $HOME/.geode/sdk-install
          mv $HOME/.geode/sdk-install $HOME/.geode/sdk
          $GITHUB_WORKSPACE/geode-bin/geode sdk set-path $HOME/.geode/sdk

      - name: Build Mod with Geode CLI
        env:
          GEODE_SDK: /home/runner/.geode/sdk
        run: |
          # Pass the target flags directly to the underlying build system using --
          geode build -- -DGEODE_TARGET=${{ matrix.config.target }} -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=${{ matrix.config.abi }}
          
