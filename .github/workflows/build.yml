name: Build Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Android32
          - target: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI Manually
        run: |
          # Create our own custom, predictable binaries folder
          mkdir -p $GITHUB_WORKSPACE/geode-bin
          
          # Download the exact live Linux release package directly
          wget https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-linux.zip -O geode-cli.zip
          
          # Unzip it right into our custom folder
          unzip geode-cli.zip -d $GITHUB_WORKSPACE/geode-bin
          
          # Give the Linux runner permission to run the executable
          chmod +x $GITHUB_WORKSPACE/geode-bin/geode
          
          # Add our custom folder to the system path so CMake can see it
          echo "$GITHUB_WORKSPACE/geode-bin" >> $GITHUB_PATH
          
          # Run the installer using our exact direct path
          $GITHUB_WORKSPACE/geode-bin/geode sdk install-binaries

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET=${{ matrix.config.target }} \
            -DCMAKE_PREFIX_PATH="$HOME/.geode/sdk" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.target == 'Android32' && 'armeabi-v7a' || 'arm64-v8a' }}

      - name: Build Mod
        run: cmake --build build --config Release
        
