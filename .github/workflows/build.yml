name: Build Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Android32
          - target: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI and SDK
        run: |
          mkdir -p $GITHUB_WORKSPACE/geode-bin
          wget https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-linux.zip -O geode-cli.zip
          unzip geode-cli.zip -d $GITHUB_WORKSPACE/geode-bin
          chmod +x $GITHUB_WORKSPACE/geode-bin/geode
          echo "$GITHUB_WORKSPACE/geode-bin" >> $GITHUB_PATH
          
          # Initialize the default profile
          $GITHUB_WORKSPACE/geode-bin/geode profile add --name default $HOME/.geode
          
          # 1. Download and install the core SDK structure first
          $GITHUB_WORKSPACE/geode-bin/geode sdk install $HOME/.geode/sdk
          
          # 2. Force link the path inside the CLI config manually
          $GITHUB_WORKSPACE/geode-bin/geode sdk set-path $HOME/.geode/sdk
          
          # 3. Now pull the mobile binaries into our freshly made SDK folder
          $GITHUB_WORKSPACE/geode-bin/geode sdk install-binaries

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET=${{ matrix.config.target }} \
            -DCMAKE_PREFIX_PATH="$HOME/.geode/sdk" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.target == 'Android32' && 'armeabi-v7a' || 'arm64-v8a' }}

      - name: Build Mod
        run: cmake --build build --config Release
        
