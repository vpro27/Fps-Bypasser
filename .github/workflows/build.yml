name: Build Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: Android

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-fps-mod
          path: ${{ steps.build.outputs.build-output }}/*
          
